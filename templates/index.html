{% extends "base.html" %} {% block content %}

<div class="main">
  <div class="title">
    <h3>Image Classifier</h3>
    <p class="subtitle">Upload an image and let the neural network predict its class</p>
  </div>

  <div class="panel">
    <input id="file-upload" class="hidden" type="file" accept="image/x-png,image/gif,image/jpeg" />
    <label for="file-upload" id="file-drag" class="upload-box">
      <div id="upload-caption" class="upload-caption">
        <div class="upload-icon">&#8682;</div>
        Drop image here or click to select
      </div>
      <img id="image-preview" class="image-preview hidden" />
    </label>
  </div>
  <div class="actions">
    <input type="button" value="Submit" class="button" onclick="submitImage();" />
    <input type="button" value="Clear" class="button secondary" onclick="clearImage();" />
  </div>

  <div id="image-box" class="image-box">
    <img id="image-display" class="image-display hidden" />
    <div id="pred-result" class="pred-result hidden"></div>
    <svg id="loader" class="loader hidden" viewBox="0 0 32 32" width="32" height="32">
      <circle id="spinner" class="spinner" cx="16" cy="16" r="14" fill="none"></circle>
    </svg>
  </div>
</div>

{% endblock %}
